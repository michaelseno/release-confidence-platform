service: release-confidence-platform
frameworkVersion: '3'

configValidationMode: error

plugins:
  - serverless-python-requirements
  - ./plugins/stage-guard

provider:
  name: aws
  runtime: python3.11
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  logRetentionInDays: ${self:custom.logRetentionInDays.${self:provider.stage}}
  environment:
    STAGE: ${self:provider.stage}
    RAW_RESULTS_BUCKET: ${self:custom.rawResultsBucketName}
    METADATA_TABLE: ${self:custom.metadataTableName}
    SCHEDULER_GROUP_NAME: ${self:custom.schedulerGroupName}
    LOG_LEVEL: INFO
    PYTHONPATH: /var/task/src
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource:
            - arn:aws:logs:${self:provider.region}:*:log-group:/aws/lambda/${self:service}-${self:provider.stage}-*:*
        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::${self:custom.rawResultsBucketName}
          Condition:
            StringLike:
              s3:prefix:
                - raw-results/*
                - configs/*
                - data-pools/*
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:HeadObject
          Resource:
            - arn:aws:s3:::${self:custom.rawResultsBucketName}/raw-results/*
            - arn:aws:s3:::${self:custom.rawResultsBucketName}/configs/*
            - arn:aws:s3:::${self:custom.rawResultsBucketName}/data-pools/*
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource:
            - arn:aws:s3:::${self:custom.rawResultsBucketName}/raw-results/*
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
          Resource:
            - Fn::GetAtt:
                - MetadataTable
                - Arn
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - arn:aws:secretsmanager:${self:provider.region}:*:secret:${self:custom.secretNamePrefix}*

custom:
  pythonRequirements:
    fileName: ../apps/backend/requirements.txt
    slim: true
    dockerizePip: non-linux
  allowedStages:
    - dev
    - staging
    - prod
  resourcePrefix: release-confidence-platform
  rawResultsBucketName: ${self:custom.resourcePrefix}-${self:provider.stage}-raw-results
  metadataTableName: ${self:custom.resourcePrefix}-${self:provider.stage}-metadata
  schedulerGroupName: rcp-${self:provider.stage}-schedules
  schedulerNamePrefix: rcp-${self:provider.stage}
  secretNamePrefix: ${self:custom.resourcePrefix}/${self:provider.stage}/
  logRetentionInDays:
    dev: 14
    staging: 30
    prod: 90
  # Evidence Governance Workstream A1 -- ADR Decision 5 / Non-Negotiable
  # Invariant 3 (adr_evidence_retention_disposal_enforcement.md); Technical
  # Design Section 5/14/17
  # (evidence_governance_workstream_a1_retention_enforcement_technical_design.md).
  #
  # Per-evidence-class, per-stage custody-period duration, sourced here as
  # the single external configuration input consumed by
  # resources/s3.yml's LifecycleConfiguration.Days/NoncurrentDays. The
  # custody-period duration value itself is a separate, lower-priority
  # Product Strategy decision (AC-A1-5) and is deliberately left unset for
  # every evidence class and every stage below -- mirroring the
  # no-fallback-value pattern already used by logRetentionInDays directly
  # above. Referencing an unset stage key (e.g.
  # ${self:custom.custodyPeriodDays.raw_evidence.dev}) fails Serverless
  # Framework variable resolution at package/deploy time with an
  # unresolved-variable error; this is an intentional fail-closed gate, not
  # a silent default -- the S3 lifecycle rules cannot deploy to any stage
  # until Product Strategy supplies real values here. No custody-period
  # duration value may be added to this block by any change other than that
  # explicit Product Strategy decision.
  custodyPeriodDays:
    raw_evidence: {}
    intelligence: {}
    report: {}
    certificate: {}

package:
  patterns:
    - '!../**'
    - '../apps/__init__.py'
    - '../apps/backend/**'
    - '!../apps/backend/**/__pycache__/**'
    - '!../apps/backend/**/*.pyc'
    - '../packages/__init__.py'
    - '../packages/audit_lifecycle/**'
    - '../packages/audit_scheduling/**'
    - '../packages/config/**'
    - '../packages/core/**'
    - '../packages/data_generation/**'
    - '../packages/sanitization/**'
    - '../packages/storage/**'
    - '../src/release_confidence_platform/__init__.py'
    - '../src/release_confidence_platform/aggregation/**'
    - '../src/release_confidence_platform/storage/**'
    - '../src/release_confidence_platform/core/**'
    - '../src/release_confidence_platform/audit_lifecycle/**'
    - '../src/release_confidence_platform/sanitization/**'
    - '!../packages/**/__pycache__/**'
    - '!../packages/**/*.pyc'

functions:
  coreEngineOrchestrator:
    handler: apps.backend.handlers.orchestrator_handler.handler
    timeout: 60
    memorySize: 256
  scheduledExecution:
    handler: apps.backend.handlers.scheduled_execution_handler.handler
    timeout: 300
    memorySize: 512
  auditFinalization:
    handler: apps.backend.handlers.audit_finalization_handler.handler
    timeout: 60
    memorySize: 256
    role:
      Fn::GetAtt:
        - AuditFinalizationLambdaRole
        - Arn
    environment:
      AGGREGATION_FUNCTION_NAME:
        Ref: AuditAggregationLambdaFunction
  auditAggregation:
    handler: apps.backend.handlers.aggregation_handler.handler
    timeout: 300
    memorySize: 512
    role:
      Fn::GetAtt:
        - AuditAggregationLambdaRole
        - Arn

resources:
  - ${file(resources/s3.yml)}
  - ${file(resources/dynamodb.yml)}
  - ${file(resources/iam.yml)}
  - ${file(resources/phase4-aggregation-iam.yml)}
  - ${file(resources/scheduler.yml)}
  - ${file(resources/evidence-retention-dlq.yml)}
