Resources:
  MetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ${self:custom.metadataTableName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: client_id
          AttributeType: S
        - AttributeName: audit_id
          AttributeType: S
      KeySchema:
        - AttributeName: client_id
          KeyType: HASH
        - AttributeName: audit_id
          KeyType: RANGE
Outputs:
  MetadataTableName:
    Description: Phase 0 future metadata table name.
    Value: ${self:custom.metadataTableName}
